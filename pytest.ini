[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --html=reports/report.html --self-contained-html -v
markers =
    smoke: quick checks for core endpoint availability
    contract: response structure and JSON Schema checks
    negative: expected error responses for unsupported or missing resources
    regression: broader checks for existing behavior
